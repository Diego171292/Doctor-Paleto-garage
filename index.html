<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Doctor Paleto Garage</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #f5c400;
  overflow-x: hidden;
}

/* SMOKE */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(245,196,0,0.08), transparent 40%),
              radial-gradient(circle at 80% 60%, rgba(255,255,255,0.05), transparent 50%),
              radial-gradient(circle at 50% 80%, rgba(245,196,0,0.04), transparent 60%);
  animation: smoke 10s infinite alternate;
  z-index: -1;
}

@keyframes smoke {
  from { transform: scale(1); opacity: 0.6; }
  to { transform: scale(1.08); opacity: 0.9; }
}

/* HEADER */
header {
  text-align: center;
  padding: 35px 20px;
  background: #000;
  border-bottom: 2px solid #f5c400;
}

h1 {
  margin: 0;
  text-shadow: 0 0 10px #f5c400;
}

header p {
  margin-top: 8px;
  color: #aaa;
}

/* SHOWROOM */
.showroom {
  display: flex;
  overflow: hidden;
  padding: 20px 0;
}

.track {
  display: flex;
  gap: 15px;
  animation: move 18s linear infinite;
}

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.car {
  min-width: 260px;
  height: 140px;
  border: 2px solid #f5c400;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px #000;
}

.car img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTENT */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #141414;
  border-left: 4px solid #f5c400;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

td {
  padding: 10px;
  border-bottom: 1px solid #333;
}

/* FORM */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #0b0b0b;
  border: 1px solid #f5c400;
  color: #f5c400;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #f5c400;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 10px #f5c400;
}
</style>

</head>

<body>

<header>
  <h1>🚗 Doctor Paleto Garage</h1>
  <p>Los Santos tuning & repair shop</p>
</header>

<!-- SHOWROOM GTA AUTÁ -->
<div class="showroom">
  <div class="track">

    <div class="car">
      <img src="https://i.imgur.com/7Q9QY3R.jpg">
    </div>

    <div class="car">
      <img src="https://i.imgur.com/2QbZ2cO.jpg">
    </div>

    <div class="car">
      <img src="https://i.imgur.com/8kQZx1M.jpg">
    </div>

    <div class="car">
      <img src="https://i.imgur.com/5rQxG7P.jpg">
    </div>

    <div class="car">
      <img src="https://i.imgur.com/9dVtK3A.jpg">
    </div>

  </div>
</div>

<div class="container">

  <div class="card">
    <h2>📸 Galéria vozidiel</h2>
    <p>GTA V tuning garage showcase</p>
  </div>

  <div class="card">
    <h2>💰 Cenník opráv</h2>
    <table>
      <tr><td>🛞 Kolesá</td><td>4 000 $</td></tr>
      <tr><td>🚪 Dvere</td><td>4 000 $</td></tr>
      <tr><td>🧰 Fixboxy</td><td>5 000 $</td></tr>
    </table>
  </div>

  <div class="card">
    <h2>🚛 Cenník odťahov</h2>
    <table>
      <tr><td>📍 Paleto</td><td>FREE</td></tr>
      <tr><td>📍 Sandy Shores</td><td>FREE</td></tr>
      <tr><td>🌆 Mesto</td><td>5 000 $</td></tr>
    </table>
  </div>

  <div class="card">
    <h2>📋 Objednávka servisu</h2>

    <input placeholder="Meno">
    <input placeholder="Vozidlo">

    <select>
      <option>Vyber službu</option>
      <option>Oprava</option>
      <option>Čistenie</option>
      <option>Tuning</option>
    </select>

    <button onclick="alert('Objednávka odoslaná 🚗💨')">
      Odoslať
    </button>
  </div>

</div>

</body>
</html>
