<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Doctor Paleto Garage</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #f5c400;
}

header {
  text-align: center;
  padding: 40px 20px;
  background: #000;
  border-bottom: 2px solid #f5c400;
}

header img {
  width: 140px;
  max-width: 100%;
}

h1 {
  margin: 10px 0 5px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #141414;
  border-left: 4px solid #f5c400;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}

.button {
  display: inline-block;
  padding: 12px 18px;
  background: #f5c400;
  color: #000;
  font-weight: bold;
  text-decoration: none;
  border-radius: 6px;
}
</style>

</head>

<body>

<header>
  <img src="logo.png" alt="logo">
  <h1>Doctor Paleto Garage</h1>
</header>

<div class="container">

  <div class="card">
    <h2>🔧 Služby</h2>
    <ul>
      <li>Opravy vozidiel</li>
      <li>Diagnostika</li>
      <li>Tuning</li>
      <li>Odtah</li>
    </ul>
  </div>

  <div class="card">
    <h2>💰 Cenník</h2>
    <ul>
      <li>🛞 Kolesá – 4 000 $</li>
      <li>🚪 Dvere – 4 000 $</li>
      <li>🧰 Fixboxy – 5 000 $</li>
    </ul>
  </div>

  <div class="card">
    <h2>🚗 Objednávky</h2>
    <p>Objednaj si servis alebo čistenie vozidla.</p>

    <a class="button" href="#">Objednať prehliadku</a><br><br>
    <a class="button" href="#">Objednať čistenie</a>
  </div>

</div>

</body>
</html>
