<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Doctor Paleto Garage</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #f5c400;
  overflow-x: hidden;
}

/* jemná atmosféra */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(245,196,0,0.08), transparent 40%),
              radial-gradient(circle at 80% 60%, rgba(255,255,255,0.05), transparent 50%);
  z-index: -1;
}

/* HEADER */
header {
  text-align: center;
  padding: 35px 20px;
  background: #000;
  border-bottom: 2px solid #f5c400;
}

h1 {
  margin: 0;
  text-shadow: 0 0 10px #f5c400;
}

header p {
  margin-top: 8px;
  color: #aaa;
}

/* LOGO */
.logo {
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* container */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #141414;
  border-left: 4px solid #f5c400;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}

/* SHOWROOM ODŤAHOVKY */
.showroom {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 15px;
}

.car {
  min-width: 220px;
  height: 130px;
  border: 2px solid #f5c400;
  border-radius: 10px;
  overflow: hidden;
  background: #111;
  flex-shrink: 0;
}

.car img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TABUĽKY */
table {
  width: 100%;
  border-collapse: collapse;
}

td {
  padding: 10px;
  border-bottom: 1px solid #333;
}

/* FORM */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #0b0b0b;
  border: 1px solid #f5c400;
  color: #f5c400;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #f5c400;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>

<body>

<header>
  <div class="logo">🚗 DOCTOR PALETO GARAGE</div>
  <p>Opravy • Tuning • Odťahová služba</p>
</header>

<div class="container">

  <!-- ODŤAHOVKY -->
  <div class="card">
    <h2>🚛 Odťahová služba</h2>

    <div class="showroom">
      <div class="car"><img src="car1.png" alt="odťah 1"></div>
      <div class="car"><img src="car2.png" alt="odťah 2"></div>
      <div class="car"><img src="car3.png" alt="odťah 3"></div>
      <div class="car"><img src="car4.png" alt="odťah 4"></div>
    </div>
  </div>

  <!-- GALÉRIA (PRIPRAVENÁ) -->
  <div class="card">
    <h2>📸 Galéria vozidiel</h2>
    <p>Galéria bude doplnená čoskoro.</p>
  </div>

  <!-- CENNÍK OPRÁV -->
  <div class="card">
    <h2>🔧 Opravy & Tuning</h2>
    <table>
      <tr><td>🛞 Pneumatiky</td><td>4 000 $</td></tr>
      <tr><td>🚪 Karoséria</td><td>4 000 $</td></tr>
      <tr><td>🧰 Kompletná oprava</td><td>5 000 $</td></tr>
      <tr><td>🎨 Tuning</td><td>Individuálna cena</td></tr>
    </table>
  </div>

  <!-- OBJEDNÁVKA -->
  <div class="card">
    <h2>📋 Objednávka servisu</h2>

    <input placeholder="Meno">
    <input placeholder="Vozidlo">

    <select>
      <option>Vyber službu</option>
      <option>Oprava</option>
      <option>Tuning</option>
      <option>Odťah</option>
    </select>

    <button onclick="alert('Objednávka odoslaná ✔')">
      Odoslať
    </button>
  </div>

</div>

</body>
</html>
